<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Ticket Sentinel</title>


<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
    body {
        background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
        color: #fff;
    }

    /* Top brand bar */
    .brand-bar {
        background: #000;
        border-bottom: 3px solid #c82333;
        padding: 15px 0;
        text-align: center;
    }

    .brand-title {
        margin: 0;
        font-weight: 600;
        letter-spacing: 1px;
    }

    .brand-title span {
        color: #c82333;
    }

    /* Login card */
    .login-container {
        margin-top: 120px;
    }

    .login-card {
        background: #fff;
        color: #000;
        border-radius: 10px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        overflow: hidden;
    }

    .login-header {
        background: #c82333;
        color: #fff;
        padding: 20px;
        text-align: center;
    }

    .btn-danger-hover {
        background-color: #000;
        color: #fff;
        border: 1px solid #000;
    }

    .btn-danger-hover:hover {
        background-color: #c82333;
        border-color: #bd2130;
        color: #fff;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #c82333;
    }

    .form-group label {
        font-weight: 500;
    }
</style>


</head>

<body>

<!-- Brand bar -->

<div class="brand-bar">
    <h2 class="brand-title">
        Ticket <span>Sentinel</span>
    </h2>
</div>

<!-- Login -->

<div class="container login-container">
    <div class="row justify-content-center">
        <div class="col-md-4">


        <div class="login-card">
            <div class="login-header">
                <h4 class="mb-0">Login</h4>
            </div>

            <div class="card-body">

                {% if error %}
                    <div class="alert alert-danger text-center">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="POST">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-danger-hover btn-block">
                        Login
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>


</div>

</body>
</html>
