{% include "header.html" %}
<script src="{{ url_for('static', filename='js/watcher.js') }}"></script>	
<div class="container-fuid bodystuff">
  <table class="table table-striped table-hover">
  	<thead class="tadfdble-dark table-bordered border-dark">
  		<tr>
  			<th scope="col"> Status </th>
			<th scope="col"> Host </th>
			<th scope="col"> First Check-in </th>
			<th scope="col"> Last Seen </th>
			<th scope="col"> Sleep </th>
		</tr>
	</thead>
	<tbody class="table-light">
	{% for agent in agents %}
	<tr class="agent-row" data-id="{{ agent['guid'] }}">
	<th scope ="row">{{ agent['status'] }} </th>
	<td>{{ agent['host'] }}</td>
	<td>{{ agent['first_seen'] }}</td>
	<td>{{ agent['last_seen'] }}</td>
	<td>{{ agent['sleep'] }}</td>
	</tr>
	{% endfor %}
	</tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal fade" id="agentModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl" style="max-width: 90vw; margin-top: 10vh;">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Agent</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="agentModalBody">
        Loading...
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Add click handler to each row
    document.querySelectorAll(".agent-row").forEach(row => {
        row.addEventListener("click", function() {
            const id = this.dataset.id;

            // Load the popup contents via AJAX
            fetch(`/agent/show/${id}`)
                .then(response => response.text())
                .then(html => {
                    document.getElementById("agentModalBody").innerHTML = html;

                    // Show Bootstrap modal
                    const modal = new bootstrap.Modal(document.getElementById("agentModal"));
                    modal.show();
                })
                .catch(err => {
                    document.getElementById("agentModalBody").innerHTML =
                        "<p class='text-danger'>Error loading agent details.</p>";
                });
        });
    });
});
document.addEventListener("DOMContentLoaded", function () {
    const REFRESH_INTERVAL_MS = 15000; // 15 seconds
    const modalEl = document.getElementById("agentModal");

    setInterval(() => {
        // If modal exists AND is currently open, do NOT refresh
        if (modalEl && modalEl.classList.contains("show")) {
            return;
        }

        // Otherwise, refresh the page
        window.location.reload();
    }, REFRESH_INTERVAL_MS);
});
</script>


	</body>
</html>
